<!-- ================= ROSTER PRO SCRIPT ================= -->
<script>

const API_URL = "https://api-tracker-gg.onrender.com";

const players = [
    { name: "Cameloth", tag: "3005", displayName: "Cameloth", img: "imagenes/streamers/cameloth.jpg", rol: "Duelista" },
    { name: "Xulinho", tag: "Miau", displayName: "Xulinho", img: "imagenes/streamers/cameloth.jpg", rol: "Duelista" },
    { name: "Andriuu", tag: "999", displayName: "Andriuu", img: "imagenes/streamers/cameloth.jpg", rol: "Duelista" },
    { name: "Sr invisiblemudo", tag: "0310", displayName: "Sr invisiblemudo", img: "imagenes/streamers/cameloth.jpg", rol: "Duelista" },
    { name: "Keke ssj", tag: "mawz", displayName: "Keke ssj", img: "imagenes/streamers/cameloth.jpg", rol: "Duelista" },
    { name: "Saaku", tag: "666", displayName: "Saaku", img: "imagenes/streamers/cameloth.jpg", rol: "Duelista" },
    { name: "Wolfsong", tag: "pico", displayName: "Wolfsong", img: "imagenes/streamers/cameloth.jpg", rol: "Duelista" },
    { name: "TenZ", tag: "NA1", displayName: "TenZ", img: "imagenes/player1.jpg", rol: "IGL" }
];

// 🔥 CACHE LOCAL (10 min)
function getCache(key) {
    const cached = localStorage.getItem(key);
    if (!cached) return null;

    const { data, time } = JSON.parse(cached);
    if (Date.now() - time > 600000) return null;

    return data;
}

function setCache(key, data) {
    localStorage.setItem(key, JSON.stringify({
        data,
        time: Date.now()
    }));
}

// 🌐 FETCH
async function getPlayerStats(name, tag) {

    const cacheKey = `${name}-${tag}`;
    const cached = getCache(cacheKey);
    if (cached) return cached;

    try {
        const res = await fetch(`${API_URL}/valorant/${encodeURIComponent(name)}/${encodeURIComponent(tag)}`);

        if (!res.ok) throw new Error("API error");

        const data = await res.json();

        setCache(cacheKey, data);

        return data;

    } catch (err) {
        console.log(`Error con ${name}`);
        return null;
    }
}

// 🎨 COLOR SEGÚN RANGO
function getRankColor(rank) {
    if (!rank) return "#090a0c";

    if (rank.includes("Radiant")) return "#ff4655";
    if (rank.includes("Immortal")) return "#a335ee";
    if (rank.includes("Diamond")) return "#4fc3f7";
    if (rank.includes("Platinum")) return "#00e5ff";
    if (rank.includes("Gold")) return "#ffd700";
    if (rank.includes("Silver")) return "#c0c0c0";
    if (rank.includes("Bronze")) return "#cd7f32";

    return "#090a0c";
}

// 🎮 RENDER
async function renderValorantTeam() {

    const container = document.getElementById("valorant-team");
    container.innerHTML = `<p class="loading">Cargando stats...</p>`;

    const results = await Promise.all(
        players.map(p => getPlayerStats(p.name, p.tag))
    );

    // 🔥 ordenar por KD
    const combined = players.map((p, i) => ({
        ...p,
        stats: results[i]
    }));

    combined.sort((a, b) => (b.stats?.kd || 0) - (a.stats?.kd || 0));

    container.innerHTML = "";

    combined.forEach((player, index) => {

        const data = player.stats;
        const color = getRankColor(data?.rank);

        container.innerHTML += `
            <div class="card" style="animation: fadeUp 0.6s ease ${index * 0.1}s both; border-color:${color}">
                
                <img src="${player.img}" alt="">

                <h3>#${index + 1} ${player.displayName}</h3>
                <p class="categoria">${player.rol}</p>

                <img class="rank-img" src="${data?.rankImage || 'imagenes/unranked.png'}">

                <div class="stats">
                    <p class="rango" style="color:${color}">🏆 ${data?.rank || 'Sin datos'}</p>
                    <p>🎯 KD: ${data?.kd || '-'}</p>
                    <p>📊 Winrate: ${data?.winrate || '-'}</p>
                    <p>⭐ Nivel: ${data?.level || '-'}</p>
                </div>

                <img class="flag" src="imagenes/flags/chile.png">
            </div>
        `;
    });

}

// 🚀 INIT
renderValorantTeam();

</script>
