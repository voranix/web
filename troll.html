<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>No mandó su parte</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- FUENTE -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Orbitron', sans-serif;
            height: 100vh;
            background: linear-gradient(135deg, #0a0a0f, #7b2cff, #ff6a00);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .container {
            padding: 40px;
            background: rgba(0,0,0,0.6);
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(123,44,255,0.5);
            max-width: 800px;
            width: 90%;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            color: #ff6a00;
            text-shadow: 0 0 15px rgba(255,106,0,0.7);
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: #ccc;
        }

        .video {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 15px;
        }

        .video iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .warning {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #aaa;
        }

    </style>
</head>
<body>

    <div class="container">
        <h1>🚨 NO MANDÓ SU PARTE 🚨</h1>
        <p>
            Este integrante del equipo decidió desaparecer en el momento más importante 💀  
            Disfruta este video mientras el resto sí trabaja...
        </p>

        <div class="video">
            <iframe 
                src="https://www.youtube.com/embed/dQw4w9WgXcQ" 
                allowfullscreen>
            </iframe>
        </div>

        <p class="warning">
            PD: Si estás viendo esto... ya sabemos quién eres 👀
        </p>
    </div>

</body>
</html>
